seed: 42
method_name: VanillaPPO
robust_train_cfg_path: configs/noise_train.yaml

train:
  total_timesteps: 200000
  learning_rate: 3.0e-4
  n_steps: 2048
  batch_size: 64
  n_epochs: 10
  gamma: 0.99
  gae_lambda: 0.95
  clip_range: 0.2
  ent_coef: 0.01
  policy: "MlpPolicy"

reward:
  w_track: 1.0
  w_water: 0.05
  w_smooth: 0.1
  w_improve: 0.2
  w_safe: 0.1
  w_ucb: 0.0

ablation:
  use_dynamic_target: false
  use_reward_shaping: true
  use_ucb_bonus: false
  use_robust_training: false
  fixed_lo_frac_TAW: 0.15
  fixed_hi_frac_TAW: 0.35
